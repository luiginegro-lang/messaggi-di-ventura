{num:"I",nm:"Il Caff\u00e8 Sacrificale",ds:"Lettura pura. Non si beve.",ss:[

{p:"Preparazione",t:"Macina medio-grosso con macinino manuale. I chicchi vecchi produrranno naturalmente fines. Questa fragilit\u00e0 \u00e8 la risorsa della ricetta."},
{p:"Preparazione",t:"Scalda 150 ml di acqua a 90\u201395\u00b0C."},

{p:"Preparazione",t:"Pesa 25 g di caff\u00e8 e 3\u20135 g di aromatiche. Macina medio-grosso. Mescola. Scalda 250 ml a 90\u201395\u00b0C."},

{p:"Estrazione",t:"La cuccumella al contrario: non capovolgere. Versa l\u2019acqua dall\u2019alto. L\u2019acqua scende per gravit\u00e0.",n:"Il gesto fondamentale \u2014 rovesciare il mondo \u2014 viene sospeso."},
{p:"La doppia tazza",t:"Prima met\u00e0: filtra con carta. Il caff\u00e8 da bere. Seconda met\u00e0: non filtrare. La tazza della lettura.",n:"La carta filtrante \u00e8 la soglia tra il piacere e la divinazione."},
{p:"Il rito",t:"Bevete insieme la prima tazza. Parlate, state, ascoltate."},

{p:"Lettura",t:"Leggi a voce, in dialogo. Descrivi le relazioni spaziali, i vuoti. Chi consulta risponde.",n:"Figure fatte pi\u00f9 di assenza che di presenza."},
]},
{num:"III",nm:"Il Caff\u00e8 della Soglia",ds:"La lettura \u00e8 nel tempo. Pratica dell\u2019ascolto.",ss:[

{p:"Preparazione",t:"Pesa 25 g di caff\u00e8 e 5\u20138 g di materiale secco. Macina medio-fine. Scalda 200 ml a 100\u00b0C."},
{p:"Estrazione",t:"Carica il cestello con caff\u00e8 e materiale secco, ben pressati. Riempi il serbatoio. Capovolgi."},

{p:"L\u2019ascolto",t:"Ascolta senza guardare. Il gocciolio sar\u00e0 irregolare: rapido, poi lento, con pause e silenzi lunghi.",n:"Dai venti ai quaranta minuti."},

var DOC=[
{t:"I. Genealogia di una pratica",c:["La caffeomanzia \u00e8 antica quanto il caff\u00e8. La tradizione yemenita, araba, turca e greca della lettura dei fondi \u2014 tasseografia, dal francese tasse, tazza \u2014 risale almeno al XVI secolo, quando il caff\u00e8 raggiunse Costantinopoli e i primi caff\u00e8 pubblici divennero luoghi di conversazione, commercio e divinazione. Il metodo \u00e8 semplice: si beve un caff\u00e8 preparato senza filtrazione (il caff\u00e8 turco, cotto nel cezve con la polvere finissima in sospensione), si capovolge la tazza sul piattino, si attende che i fondi scendano lungo le pareti formando figure, e si legge.","Questa pratica ha attraversato secoli e geografie mantenendo una struttura costante: il caff\u00e8 produce una materia residuale densa, il gesto del capovolgimento trasferisce quella materia sulle pareti della tazza, il tempo di attesa \u00e8 un tempo rituale di sospensione, e la lettura avviene attraverso il riconoscimento di forme in una superficie caotica \u2014 un procedimento analogo al test di Rorschach, al quale \u00e8 storicamente anteriore.","La caffeomanzia cafausica parte da qui ma diverge radicalmente, per tre ragioni.","La prima \u00e8 il mezzo. La cuccumella, il filtro manuale, la moka \u2014 i metodi di estrazione che appartengono alla tradizione italiana e alla pratica contemporanea dello specialty coffee \u2014 producono caff\u00e8 filtrato. I fondi restano nel cestello, nel filtro di carta, nella camera della moka. Nella tazza arriva un liquido essenzialmente pulito. La caffeomanzia classica diventa fisicamente impossibile: manca la materia. Questo vincolo tecnico \u00e8 il punto di partenza dell\u2019invenzione.","La seconda \u00e8 la materia prima. La caffeomanzia cafausica utilizza esclusivamente caff\u00e8 esausto \u2014 chicchi invecchiati, buste dimenticate, specialty coffee che non \u00e8 piaciuto, fondi di magazzino, lotti rifiutati, campioni abbandonati. Caff\u00e8 che il mercato ha dichiarato finito. L\u2019atto fondativo di questa pratica \u00e8 il rifiuto dello spreco: ci\u00f2 che \u00e8 stato scartato trova una funzione diversa, una seconda vita che \u00e8 una vita altra.","La terza \u00e8 il metodo di lettura. La caffeomanzia cafausica legge la materia nella sua materialit\u00e0: densit\u00e0 e rarefazione, centro e periferia, continuit\u00e0 e frattura. Pi\u00f9 vicino alla psicoanalisi che alla chiromanzia."]},
{t:"Il caff\u00e8 come soglia",c:["Nel mondo cafausico, il caff\u00e8 \u00e8 un medium orfico \u2014 una sostanza che attraversa soglie. Il chicco verde muore nella tostatura, la polvere muore nell\u2019acqua calda, il liquido muore nel corpo di chi beve.","Il caff\u00e8 esausto \u2014 quello che ha gi\u00e0 attraversato tutte le sue soglie utili \u2014 compie un ultimo attraversamento. La sua esaustione \u00e8 la condizione della sua trasformazione in medium. Ci\u00f2 che non serve pi\u00f9 a niente serve a qualcosa che niente altro potrebbe fare."]},
{t:"Una lettura contemporanea",c:["Jodorowsky ha trasformato i tarocchi da strumento di predizione a strumento di analisi del presente. La caffeomanzia cafausica prova a compiere un\u2019operazione analoga. Il caff\u00e8 produce un\u2019immagine non intenzionale \u2014 un monotipo \u2014 e quell\u2019immagine diventa una superficie proiettiva. Questo riconoscimento \u00e8 il momento oracolare.","La dimensione esoterica resta intatta perch\u00e9 la materia \u00e8 reale. Ogni lettura \u00e8 irripetibile perch\u00e9 ogni combinazione di variabili \u00e8 unica."]},
{t:"La dimensione politica",c:["Lo spreco del caff\u00e8 \u00e8 un problema reale. Per noi il caff\u00e8 esausto ha un valore rituale, comunitario, estetico, oracolare. Una politica della soglia, in cui ci\u00f2 che \u00e8 finito in un sistema ricomincia in un altro."]},
{t:"II. Il metodo di lettura",c:["1. Si legge la relazione, non la figura. Come sta questa materia nello spazio?","2. Il vuoto \u00e8 il testo principale. Il vuoto come potenzialit\u00e0.","3. La lettura \u00e8 dialogica. Il caff\u00e8 non predice il futuro. Rende visibile il presente.","4. La carta \u00e8 un archivio. Un monotipo unico, irripetibile, databile.","5. La lettura \u00e8 un atto di ospitalit\u00e0. Tempo, silenzio, presenza."]},
{t:"V. Il Caff\u00e8 dell\u2019Incontro",c:["Un caff\u00e8 monorigine, trenta-quarantacinque giorni dopo la tostatura, non \u00e8 morto. Ha perso la sua firma. L\u2019individuo \u00e8 diventato categoria.","La metafora giusta non \u00e8 la morte. \u00c8 la perdita di identit\u00e0. Il vuoto c\u2019\u00e8, ma \u00e8 un vuoto sordo.","Aggiungere aromi oscilla tra protesi e possessione. La protesi restituisce una voce. La possessione impone una voce a un corpo ancora vivo.","Il Caff\u00e8 dell\u2019Incontro \u00e8 possibile solo come protesi. Due materie in stato di dispersione si trovano nel punto in cui nessuna \u00e8 pi\u00f9 pienamente s\u00e9 stessa. Il caff\u00e8 \u00e8 il letto, la spezia \u00e8 il sogno."]},

function StepBar(p){

// STEPS — handles both normal recipes and branching (Incontro)
function Steps(p){
  var r=p.recipe;

  // Branching recipe state
  var vi=us(-1),variant=vi[0],setVar=vi[1]; // -1 = in common steps, 0/1/2 = in variant
  var si=us(0),idx=si[0],setIdx=si[1];

  var steps,len;
  if(r.branching){
    if(variant===-1){
      steps=r.common;
    } else {
      steps=r.variants[variant].ss;
    }
  } else {
    steps=r.ss;
  }
  len=steps.length;
  var s=steps[idx];
  var totalCommon=r.branching?r.common.length:0;
  var pct;
  if(r.branching){
    if(variant===-1) pct=((idx+1)/(totalCommon+3))*100; // approximate
    else pct=((totalCommon+idx+1)/(totalCommon+steps.length))*100;
  } else {
    pct=((idx+1)/len)*100;
  }

  function prev(){if(idx>0)setIdx(idx-1);else if(variant>=0){setVar(-1);setIdx(totalCommon-1)}}
  function next(){
    if(idx<len-1)setIdx(idx+1);
    else if(r.branching&&variant===-1){/* show variant choice — handled below */}
    else p.back();
  }

  ue(function(){window.scrollTo(0,0)},[idx,variant]);

  // Show variant choice screen
  if(r.branching&&variant===-1&&idx===len-1){
    // Last common step — after user reads it, next tap shows variant choice
    // Actually let's show variant choice as a separate screen
  }

  // Variant choice screen
  var vc=us(false),showChoice=vc[0],setChoice=vc[1];

  function nextOrChoice(){
    if(r.branching&&variant===-1&&idx===len-1){
      setChoice(true);
    } else {
      next();
    }
  }

  if(showChoice){
    return h("div",null,
      h("div",{className:"step"},
        h("div",{className:"st-nm"},r.nm),
        h("div",{className:"st-ph"},"Scegli la variante"),
        h("div",{style:{width:"100%",maxWidth:400}},
          r.variants.map(function(vr,vi2){
            return h("div",{key:vi2,className:"rc",style:{marginBottom:16},onClick:function(){setVar(vi2);setIdx(0);setChoice(false)}},
              h("span",{className:"rc-t"},vr.nm)
            );
          })
        )
      ),
      h(StepBar,{
        prog:pct,home:p.home,menu:p.back,vocab:p.vocab,
        prev:function(){setChoice(false)},canPrev:true,
        next:function(){},nextLabel:"",
        count:""
      })
    );
  }

  var countStr=(idx+1)+" / "+len;
  var isLast=idx===len-1;
  var nextLbl;
  if(r.branching&&variant===-1&&isLast) nextLbl="Scegli \u2192";
  else if(isLast) nextLbl="Fine";
  else nextLbl="\u2192";

  return h("div",null,
    h("div",{className:"step",key:""+variant+"-"+idx},
      h("div",{className:"st-nm"},r.nm+(variant>=0?" \u2014 "+r.variants[variant].nm:"")),
      s.p?h("div",{className:"st-ph"},s.p):null,
      h("div",{className:"st-tx",key:"t"+variant+"-"+idx},s.t),
      s.n?h("div",{className:"st-nt",key:"n"+variant+"-"+idx},s.n):null
    ),
    h(StepBar,{
      prog:pct,home:p.home,menu:p.back,vocab:p.vocab,
      prev:prev,canPrev:idx>0||(variant>=0),
      next:isLast&&!(r.branching&&variant===-1)?p.back:nextOrChoice,
      nextLabel:nextLbl,
      count:countStr
    })
  );
}
